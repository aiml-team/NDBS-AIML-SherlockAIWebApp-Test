name: Build and deploy Python app to Azure Web App - SherlockAIWebApp

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    # Only run in the PROD repository. Prevents this workflow from firing in
    # the test repo (which has a separate workflow) after cross-repo pushes.
    if: github.repository == 'aiml-team/NDBS-AIML-SherlockAIWebApp'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build React frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/
            !frontend/node_modules/

  deploy:
    if: github.repository == 'aiml-team/NDBS-AIML-SherlockAIWebApp'
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'SherlockAIWebApp'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_C74768C04FC548DEA07C9D8C94CFB7E4 }}
